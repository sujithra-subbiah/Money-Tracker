<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1: Money Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<audio id="click-sound" src="assests/click.mp3" preload="auto"></audio>
<audio id="delete-sound" src="assests/delete.mp3" preload="auto"></audio>

    <div class="container">
        <header class="animate-fade-in">
            <h1>💰 Money Tracker</h1>
            
            <div class="balance-card">
                <p>Current Balance</p>
                <h2 id="balance">$0.00</h2>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <span>Income</span>
                    <h3 id="money-plus" class="money plus">+$0.00</h3>
                </div>
                <div class="stat-box">
                    <span>Expense</span>
                    <h3 id="money-minus" class="money minus">-$0.00</h3>
                </div>
            </div>
        </header>

        <section class="input-section">
            <input type="text" id="text" placeholder="What did you buy?">
            <input type="number" id="amount" placeholder="Amount (Expense: -50, Income: 100)">
            <button id="add-btn">Add Transaction</button>
            <button id="clear-btn" class="clear-btn">🧹 Clear All Data</button>
        </section>

        <section class="history">
            <h3>History</h3>
            <ul id="list" class="list"></ul>
        </section>
    </div>

    <script src="script.js"></script>
