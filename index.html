<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1: Money Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="script.js" defer></script>
</head>
<body>
    <audio id="click-sound" src="assests/click.mp3" preload="auto"></audio>
    <audio id="delete-sound" src="assests/delete.mp3" preload="auto"></audio>

    <div class="container">
        <header class="animate-fade-in">
            <h1>💰 Money Tracker</h1>
            
            <div class="balance-card">
                <p>Current Balance</p>
                <h2 id="balance">$0.00</h2>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <span>Income</span>
                    <h3 id="money-plus" class="money plus">+$0.00</h3>
                </div>
                <div class="stat-box">
                    <span>Expense</span>
                    <h3 id="money-minus" class="money minus">-$0.00</h3>
                </div>
            </div>
        </header>

        <section class="input-section">
            <div class="input-group">
                <label id="label-text">Transaction Detail</label>
                <input type="text" id="text" placeholder="Loading...">
            </div>
            
            <div class="input-group">
                <label id="label-amount">Amount</label>
                <input type="number" id="amount" placeholder="Loading...">
            </div>

            <button id="add-btn">Add Transaction</button>
            <button id="clear-btn" class="clear-btn">🧹 Clear All Data</button>
        </section>

        <section class="history">
            <h3>History</h3>
            <ul id="list" class="list"></ul>
        </section>
    </div>

<footer class="main-footer animate-fade-in">
    <div class="social-container">
        <a href="https://github.com/sujithra-subbiah" target="_blank" class="social-link">
            <i class="fab fa-github"></i> GitHub
        </a>
        <a href="https://www.linkedin.com/in/s-sujithra-subbiah/" target="_blank" class="social-link">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>
<a href="https://sujithra-subbiah.github.io/portfolio/" target="_blank" class="social-link">
    <i class="fas fa-external-link-alt"></i> Portfolio
</a>
    </div>
    <p class="copyright">&copy; 2026 | Web Developer</p>
</footer>
</body>
</html>
